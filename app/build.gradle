plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mofang.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.mofang.app'
        minSdk 24
        targetSdk 34
        versionCode 3
        versionName '1.3'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.10.0'
}